name: TikTok動画生成

on:
  workflow_dispatch:
    inputs:
      url:
        description: '楽天の商品ページURL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  make:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 環境準備
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          pip install requests pillow

      - name: 動画生成+自動審査(否認時は自動修正して最大3回再生成)
        run: python scripts/make_video.py "${{ github.event.inputs.url }}"

      - name: 結果をリポジトリに保存(容認→out、否認→rejected)
        run: |
          git config user.name "video-bot"
          git config user.email "bot@users.noreply.github.com"
          git add out/ rejected/
          git commit -m "動画生成: ${{ github.event.inputs.url }}" || echo "変更なし"
          git pull --rebase origin main || true
          git push
