const W = 1080, H = 1920; // 書き出し解像度

// ---------- 描画エンジン(プレビューと書き出しで共用) ----------
function coverDraw(ctx, img, w, h, scale, dx, dy) {
    const ir = img.naturalWidth / img.naturalHeight;
    const cr = w / h;
    let dw, dh;
    if (ir > cr) {
        dh = h * scale;
        dw = dh * ir;
    }
    else {
        dw = w * scale;
        dh = dw / ir;
    }
    ctx.drawImage(img, (w - dw) / 2 + dx * w, (h - dh) / 2 + dy * h, dw, dh);
}
function drawScene(ctx, w, h, scene, img, p, product) {
    const s = w / W; // 1080基準スケール
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);
    // 画像 + エフェクト
    let flashAlpha = 0;
    if (img && img.complete && img.naturalWidth > 0) {
        let scale = 1.08, dx = 0, dy = 0;
        const e = scene.effect;
        if (e === "zoomIn")
            scale = 1.02 + 0.14 * p;
        else if (e === "zoomOut")
            scale = 1.16 - 0.14 * p;
        else if (e === "panLeft") {
            scale = 1.14;
            dx = 0.03 - 0.06 * p;
        }
        else if (e === "panRight") {
            scale = 1.14;
            dx = -0.03 + 0.06 * p;
        }
        else if (e === "punchIn")
            scale = 1.02 + 0.17 * Math.min(1, p / 0.12); // 冒頭で一気に寄る
        else if (e === "shake") {
            scale = 1.12;
            dx = 0.008 * Math.sin(p * 85);
            dy = 0.006 * Math.sin(p * 63);
        }
        else if (e === "flash") {
            scale = 1.05 + 0.05 * p;
            flashAlpha = Math.max(0, 1 - p * 6);
        }
        else
            scale = 1.02;
        coverDraw(ctx, img, w, h, scale, dx, dy);
        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
            ctx.fillRect(0, 0, w, h);
        }
    }
    else {
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "#666";
        ctx.font = `${40 * s}px ${FONT}`;
        ctx.textAlign = "center";
        ctx.fillText("画像なし", w / 2, h / 2);

    // 下部グラデーション(テロップ可読性)
    const g = ctx.createLinearGradient(0, h * 0.55, 0, h);

    ctx.fillRect(0, h * 0.55, w, h * 0.45);

        ctx.strokeStyle = "rgba(0,0,0,0.85)";
        ctx.lineWidth = size * 0.16;

        ctx.fillStyle = fill;
        ctx.fillText(text, x, y);
    };

        const pop = Math.min(1, p * 6);
        const size = (86 + 8 * pop) * s;
        ctx.save();
        ctx.globalAlpha = Math.min(1, p * 8);

            strokeText(ln, w / 2, h * 0.42 + i * size * 1.22, size, 900, i === 0 ? "#FFE14D" : "#fff");
        });
        ctx.restore();
    }
    else if (scene.role === "price") {
        // 価格バッジ
        const priceNum = Number((product === null || product === void 0 ? void 0 : product.price) || 0);
        const priceStr = priceNum ? `¥${priceNum.toLocaleString()}` : (scene.text || "");
        const bw = w * 0.72, bh = 210 * s, bx = (w - bw) / 2, by = h * 0.40;
        ctx.save();
        ctx.globalAlpha = 0.94;
        ctx.fillStyle = "#E8112D";
        const r = 28 * s;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, r);
        ctx.fill();
        ctx.restore();
        strokeText(priceStr, w / 2, by + bh * 0.68, 120 * s, 900, "#fff");
        if (scene.sub)
            strokeText(scene.sub, w / 2, by - 40 * s, 52 * s, 800, "#FFE14D");

        lines.forEach((ln, i) => strokeText(ln, w / 2, h * 0.70 + i * 78 * s, 60 * s));
    }
    else {
        // 通常テロップ: 下部(TikTokのキャプション帯を避け、h*0.62〜0.76に配置)
        const size = 64 * s;
        lines.forEach((ln, i) => strokeText(ln, w / 2, h * 0.66 + i * size * 1.25, size));

        }
    }
}
function drawGuides(ctx, w, h) {
    // TikTok UIセーフゾーン(プレビュー専用)
    ctx.save();
    ctx.fillStyle = "rgba(255,93,115,0.16)";
    ctx.fillRect(w * 0.86, h * 0.30, w * 0.14, h * 0.50); // 右アイコン列
    ctx.fillRect(0, h * 0.82, w, h * 0.18); // 下部キャプション帯
    ctx.strokeStyle = "rgba(255,93,115,0.5)";
    ctx.setLineDash([6, 6]);
    ctx.strokeRect(w * 0.86, h * 0.30, w * 0.14, h * 0.50);
    ctx.strokeRect(0, h * 0.82, w, h * 0.18);
    ctx.restore();
}

// ---------- 音声エンジン(Web Audio合成・著作権フリー) ----------
function noiseBuffer(ac, sec = 0.5) {
    const buf = ac.createBuffer(1, ac.sampleRate * sec, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
        d[i] = Math.random() * 2 - 1;
    return buf;
}
function scheduleSE(ac, out, t, kind) {
    const g = ac.createGain();
    g.connect(out);
    if (kind === "impact") {
        // フック用: 低音ドン + ノイズバースト
        const o = ac.createOscillator();
        o.type = "sine";
        o.frequency.setValueAtTime(130, t);
        o.frequency.exponentialRampToValueAtTime(42, t + 0.3);
        g.gain.setValueAtTime(0.85, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        o.connect(g);
        o.start(t);
        o.stop(t + 0.45);
        const n = ac.createBufferSource();
        n.buffer = noiseBuffer(ac, 0.1);
        const ng = ac.createGain();
        ng.gain.setValueAtTime(0.3, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
        n.connect(ng);
        ng.connect(out);
        n.start(t);
    }
    else if (kind === "whoosh") {
        // 場面転換: ノイズのバンドパススイープ
        const n = ac.createBufferSource();
        n.buffer = noiseBuffer(ac, 0.3);
        const f = ac.createBiquadFilter();
        f.type = "bandpass";
        f.Q.value = 1.2;
        f.frequency.setValueAtTime(400, t);
        f.frequency.exponentialRampToValueAtTime(3600, t + 0.2);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.32, t + 0.06);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
        n.connect(f);
        f.connect(g);
        n.start(t);
    }
    else if (kind === "ding") {
        // 価格用: チャリン(2打)
        [0, 0.09].forEach((dt, i) => {
            [1244.5, 1864.7].forEach((fq) => {
                const o = ac.createOscillator();
                o.type = "triangle";
                o.frequency.value = fq * (i ? 1.002 : 1);
                const og = ac.createGain();
                og.gain.setValueAtTime(0.22, t + dt);
                og.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.5);
                o.connect(og);
                og.connect(out);
                o.start(t + dt);
                o.stop(t + dt + 0.55);
            });
        });
    }
    else if (kind === "pop") {
        const o = ac.createOscillator();
        o.type = "triangle";
        o.frequency.setValueAtTime(520, t);
        o.frequency.exponentialRampToValueAtTime(920, t + 0.1);
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
        o.connect(g);
        o.start(t);
        o.stop(t + 0.16);
    }
}
function scheduleBeat(ac, out, t0, totalSec, bpm = 104) {
    const beat = 60 / bpm;
    for (let t = t0; t < t0 + totalSec - 0.3; t += beat) {
        // キック
        const o = ac.createOscillator();
        o.type = "sine";
        o.frequency.setValueAtTime(150, t);
        o.frequency.exponentialRampToValueAtTime(48, t + 0.1);
        const g = ac.createGain();
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o.connect(g);
        g.connect(out);
        o.start(t);
        o.stop(t + 0.14);
        // ハイハット(8分)
        [0, beat / 2].forEach((dt) => {
            const n = ac.createBufferSource();
            n.buffer = noiseBuffer(ac, 0.05);
            const f = ac.createBiquadFilter();
            f.type = "highpass";
            f.frequency.value = 6500;
            const hg = ac.createGain();
            hg.gain.setValueAtTime(0.09, t + dt);
            hg.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.04);
            n.connect(f);
            f.connect(hg);
            hg.connect(out);
            n.start(t + dt);
        });
    }
}
// ---------- CSVパーサ(dl-normal-item / Shift_JIS対応) ----------
function parseCsv(text) {
    const rows = [];
    let row = [], field = "", q = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (q) {
            if (c === '"') {
                if (text[i + 1] === '"') {
                    field += '"';
                    i++;
                }
                else
                    q = false;
            }
            else
                field += c;
        }
        else if (c === '"')
            q = true;
        else if (c === ",") {
            row.push(field);
            field = "";
        }
        else if (c === "\n" || c === "\r") {
            if (c === "\r" && text[i + 1] === "\n")
                i++;
            row.push(field);
            field = "";
            if (row.length > 1 || row[0] !== "")
                rows.push(row);
            row = [];
        }
        else
            field += c;
    }
    if (field !== "" || row.length) {
        row.push(field);
        rows.push(row);
    }
    return rows;
}

function draftScenes(product, imageCount, tplKey) {
    const tpl = TEMPLATES[tplKey] || TEMPLATES.balance;
    const wrap = (t) => {
        t = t.slice(0, 26);
        return t.length > 13 ? t.slice(0, 13) + "\n" + t.slice(13) : t;
    };
    const sentences = (product.description || "")
        .split(/[。\n!！]/)
        .map((t) => t.trim())
        .filter((t) => t.length >= 6 && t.length <= 40)
        .slice(0, tpl.bodies);
    const lastImg = Math.max(0, imageCount - 1);
    const priceScene = (img) => ({
        role: "price", img: Math.min(img, lastImg), text: "",
        sub: (product.specs || []).find((s) => s.includes("送料")) ? "送料込み" : "",
        sec: 2.2, effect: "static",
    });
    const list = [];
    list.push({ role: "hook", img: 0, text: wrap((product.title || "").slice(0, 24)), sub: "", sec: tpl.hookSec, effect: "punchIn" });
    if (tplKey === "priceFirst" && product.price)
        list.push(priceScene(1));
    sentences.forEach((t, i) => list.push({ role: "body", img: Math.min(i + 1, lastImg), text: wrap(t), sub: "", sec: tpl.bodySec, effect: tpl.effects[i % tpl.effects.length] }));
    if (tplKey !== "priceFirst" && product.price)
        list.push(priceScene(sentences.length + 1));
    list.push({ role: "cta", img: 0, text: "詳細は\nプロフィールから", sub: "", sec: 2.0, effect: "zoomOut" });
    return list;
}
function stripHtml(html) {
    if (!html)
        return "";
    const withBreaks = String(html).replace(/<br\s*\/?>/gi, "\n").replace(/<\/(p|div|li|tr)>/gi, "\n");
    const doc = new DOMParser().parseFromString(withBreaks, "text/html");
    return (doc.body.textContent || "").replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n").trim();
}
