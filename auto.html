<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok動画 全自動生成</title>
<style>
  body { margin:0; font-family:-apple-system,sans-serif; background:#0F1320; color:#EDEFF5; }
  .wrap { max-width:560px; margin:0 auto; padding:20px 16px 60px; }
  h1 { font-size:20px; color:#FFE14D; }
  label { display:block; font-size:12px; color:#8C93A8; margin:14px 0 4px; font-weight:bold; }
  input { width:100%; box-sizing:border-box; padding:12px; border-radius:10px; border:1px solid #2A3145;
          background:#141926; color:#EDEFF5; font-size:14px; }
  button { width:100%; margin-top:16px; padding:14px; border:none; border-radius:12px;
           background:#d4a017; color:#1a2744; font-size:16px; font-weight:900; }
  button:disabled { opacity:.5; }
  #status { margin-top:16px; padding:12px; border-radius:10px; background:#141926;
            border:1px solid #2A3145; font-size:13px; white-space:pre-wrap; }
  video { width:100%; margin-top:16px; border-radius:12px; background:#000; }
  a.dl { display:block; margin-top:10px; text-align:center; color:#FFE14D; font-weight:bold; }
  .small { font-size:11px; color:#8C93A8; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚡ TikTok動画 全自動生成</h1>

  <label>楽天の商品ページURL</label>
  <input id="url" placeholder="https://item.rakuten.co.jp/beltaworks/10013538/" inputmode="url">

  <label>GitHubトークン(初回のみ・この端末に保存されます)</label>
  <input id="token" type="password" placeholder="github_pat_...">
  <div class="small">Settings → Developer settings → Fine-grained tokens で作成(対象: tiktok-maker / Actions: Read and write)</div>

  <button id="go" onclick="run()">🎬 動画を生成する</button>
  <div id="status">待機中</div>
  <div id="result"></div>
</div>
<script>
const OWNER = "yamamotogojou", REPO = "tiktok-maker", WF = "make-video.yml";
const tokenInput = document.getElementById("token");
try { const t = localStorage.getItem("gh_token"); if (t) tokenInput.value = t; } catch (e) {}

function setStatus(msg) { document.getElementById("status").textContent = msg; }

async function run() {
  const url = document.getElementById("url").value.trim();
  const token = tokenInput.value.trim();
  if (!/^https:\/\/item\.rakuten\.co\.jp\//.test(url)) { setStatus("⚠ 楽天の商品ページURLを入れてください"); return; }
  if (!token) { setStatus("⚠ GitHubトークンを入れてください(初回のみ)"); return; }
  try { localStorage.setItem("gh_token", token); } catch (e) {}

  const manage = url.split("/").filter(Boolean).pop();
  const btn = document.getElementById("go");
  btn.disabled = true;
  document.getElementById("result").innerHTML = "";
  setStatus("🚀 生成を開始しています…");

  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WF}/dispatches`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" },
    body: JSON.stringify({ ref: "main", inputs: { url } })
  });
  if (res.status !== 204) {
    const t = await res.text();
    setStatus("❌ 起動失敗 (" + res.status + ")\nトークンの権限(Actions: Read and write)を確認してください\n" + t.slice(0, 200));
    btn.disabled = false;
    return;
  }

  setStatus("⏳ クラウドで生成中… 通常1〜3分かかります(このまま待ってください)");
  const videoUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/out/${manage}.mp4`;
  const started = Date.now();
  const timer = setInterval(async () => {
    const mins = Math.floor((Date.now() - started) / 60000);
    setStatus(`⏳ 生成中… ${Math.floor((Date.now() - started) / 1000)}秒経過`);
    try {
      const head = await fetch(videoUrl + "?t=" + Date.now(), { method: "HEAD", cache: "no-store" });
      if (head.ok) {
        const lm = new Date(head.headers.get("last-modified") || 0).getTime();
        if (!lm || lm > started - 60000) {
          clearInterval(timer);
          setStatus("✅ 完成!下の動画を確認して、良ければ保存 → ドライブのベルタへ");
          document.getElementById("result").innerHTML =
            `<video controls playsinline src="${videoUrl}?t=${Date.now()}"></video>
             <a class="dl" href="${videoUrl}" download="${manage}.mp4">⬇ 動画をダウンロード</a>`;
          btn.disabled = false;
        }
      }
    } catch (e) {}
    if (Date.now() - started > 8 * 60000) {
      clearInterval(timer);
      setStatus("⚠ 8分経っても完成しませんでした。GitHubのActionsタブでエラーを確認してください");
      btn.disabled = false;
    }
  }, 15000);
}
</script>
</body>
</html>
